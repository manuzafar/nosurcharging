name: CI

on:
  pull_request:
    branches: [staging, main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo typecheck

  test:
    runs-on: ubuntu-latest
    env:
      IP_HASH_SECRET: ci-test-secret
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo test:unit

  build:
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo build

  # PR-time E2E smoke. Runs the homepage.spec.ts suite only — these are
  # static pages that don't touch the database (Supabase placeholder is
  # enough). The full E2E suite, including assessment + results flows that
  # require a real Supabase, runs against the deployed staging URL in
  # .github/workflows/deploy-staging.yml.
  #
  # Why this exists: copy drift in PRs (e.g. CTA text rename) used to slip
  # past unit tests + build and only surface on the staging-deploy E2E
  # job — which lands AFTER the merge. This job catches that class of
  # regression on the PR itself.
  e2e-smoke:
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    timeout-minutes: 12
    env:
      # Build-time
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
      # Runtime — validateConfig() runs in RootLayout and requires these.
      # Placeholder values that satisfy the format checks; no live calls
      # are made because homepage.spec.ts only exercises static pages.
      IP_HASH_SECRET: ci-smoke-secret-must-be-thirty-two-characters-long
      EMAIL_ENCRYPTION_KEY: ci-smoke-encryption-key-32-chars-x
      NEXT_PUBLIC_POSTHOG_KEY: phc_ci_smoke_placeholder
      NEXT_PUBLIC_POSTHOG_HOST: https://app.posthog.com
      POSTHOG_NODE_KEY: phc_ci_smoke_placeholder
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm --filter web exec playwright install --with-deps chromium

      - name: Build app
        run: pnpm turbo build

      - name: Start app
        working-directory: apps/web
        run: |
          pnpm exec next start -p 3000 > .next-start.log 2>&1 &
          echo "PID=$!" >> $GITHUB_ENV

      - name: Wait for app to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/api/health > /dev/null; then
              echo "App is up (attempt $i)"
              exit 0
            fi
            sleep 2
          done
          echo "App did not start within 60s"
          cat apps/web/.next-start.log || true
          exit 1

      - name: Run E2E homepage smoke
        working-directory: apps/web
        run: npx playwright test e2e/homepage.spec.ts
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          CI: true

      - name: Upload Playwright report on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-smoke-report
          path: apps/web/playwright-report/
          retention-days: 7

  # Forbidden-phrase linter — catches stale copy that's been replaced
  # site-wide. If a phrase listed below appears in apps/web/ source or
  # tests, the build fails. Add new entries when copy is decisively
  # retired. Tests + comments are intentionally NOT excluded — if a
  # mock asserts on retired copy, that's exactly the drift we want to
  # surface.
  copy-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for retired phrases
        run: |
          set -e
          forbidden=(
            "Generate my free report"
            "Stripe, Square, Tyro,"
            '\$50M\+ · individually negotiated'
          )
          fail=0
          for phrase in "${forbidden[@]}"; do
            echo "::group::Searching for '$phrase'"
            if grep -rn -E "$phrase" apps/web --include="*.tsx" --include="*.ts" --include="*.css" 2>/dev/null; then
              echo "::error::Forbidden phrase found: $phrase"
              fail=1
            else
              echo "ok"
            fi
            echo "::endgroup::"
          done
          exit $fail
