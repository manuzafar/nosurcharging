name: Deploy Staging

on:
  push:
    branches: [staging]

env:
  STAGING_URL: https://nosurcharging-staging.up.railway.app

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    env:
      IP_HASH_SECRET: ci-test-secret
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo test:unit
      - run: pnpm turbo build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      # Railway auto-deploys from staging branch — no manual deploy step needed

  e2e:
    runs-on: ubuntu-latest
    needs: test-and-build
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      # Install only Chromium to save CI time (~400MB vs ~2GB for all browsers)
      - name: Install Playwright Chromium
        run: pnpm --filter web exec playwright install --with-deps chromium

      # Poll health check until the NEW commit is deployed — prevents testing stale code
      - name: Wait for staging deployment
        run: |
          EXPECTED_SHA="${GITHUB_SHA}"
          echo "Waiting for commit ${EXPECTED_SHA:0:7} to be deployed to staging..."
          for i in $(seq 1 60); do
            RESPONSE=$(curl -sf ${{ env.STAGING_URL }}/api/health 2>/dev/null || echo '{}')
            STATUS=$(echo "$RESPONSE" | jq -r '.status // "down"')
            COMMIT=$(echo "$RESPONSE" | jq -r '.commit // "unknown"')
            if [ "$STATUS" = "ok" ] && [ "$COMMIT" = "$EXPECTED_SHA" ]; then
              echo "Staging is healthy with correct commit ${EXPECTED_SHA:0:7} (attempt $i)"
              exit 0
            fi
            echo "Attempt $i: status=$STATUS commit=${COMMIT:0:7} (expected ${EXPECTED_SHA:0:7}), retrying in 10s..."
            sleep 10
          done
          echo "Staging did not deploy commit ${EXPECTED_SHA:0:7} within 10 minutes"
          exit 1

      # Run E2E tests against live staging deployment
      - name: Run E2E tests
        run: pnpm turbo test:e2e
        env:
          PLAYWRIGHT_BASE_URL: ${{ env.STAGING_URL }}

      # Upload Playwright report on failure for debugging
      - name: Upload E2E report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7
