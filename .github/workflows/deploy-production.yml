name: Deploy Production

on:
  push:
    branches: [main]

env:
  PRODUCTION_URL: https://nosurcharging.com.au

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production  # Requires manual approval in GitHub Settings → Environments
    env:
      IP_HASH_SECRET: ci-test-secret
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo test:unit
      - run: pnpm turbo build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      # Railway auto-deploys from main branch

  smoke-test:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      # Poll health check instead of blind sleep
      - name: Wait for production deployment
        run: |
          echo "Waiting for production to be healthy..."
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" ${{ env.PRODUCTION_URL }}/api/health || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Production is healthy (attempt $i)"
              exit 0
            fi
            echo "Attempt $i: status $STATUS, retrying in 10s..."
            sleep 10
          done
          echo "Production did not become healthy in 5 minutes"
          exit 1

      - name: Health check response valid
        run: |
          BODY=$(curl -sf ${{ env.PRODUCTION_URL }}/api/health)
          echo "$BODY" | grep -q '"status":"ok"' || (echo "Health check returned unexpected body: $BODY" && exit 1)

      - name: Homepage loads
        run: |
          curl -sf ${{ env.PRODUCTION_URL }}/ | grep -q "nosurcharging" || exit 1

      - name: Privacy policy loads
        run: |
          curl -sf ${{ env.PRODUCTION_URL }}/privacy | grep -q "What we collect" || exit 1
