name: Deploy Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    env:
      IP_HASH_SECRET: ci-test-secret
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo test:unit
      - run: pnpm turbo build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_PLAUSIBLE_DOMAIN: nosurcharging.com.au

      # Railway auto-deploys from main branch

  smoke-test:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Wait for production deploy
        run: sleep 90
      - name: Health check
        run: |
          curl -sf https://nosurcharging.com.au/api/health || exit 1
      - name: Homepage loads
        run: |
          curl -sf https://nosurcharging.com.au/ | grep -q "nosurcharging" || exit 1
